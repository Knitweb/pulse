# 5mart.ml — serve the assembled Knitweb site (see deploy.sh).
# Place under /etc/nginx/sites-available/ and symlink into sites-enabled.
server {
    listen 80;
    listen [::]:80;
    server_name 5mart.ml www.5mart.ml;

    root /var/www/5mart;
    index index.html;

    # security headers (defense-in-depth; all content is static + self-contained)
    add_header X-Content-Type-Options   nosniff             always;
    add_header X-Frame-Options          SAMEORIGIN          always;
    add_header Referrer-Policy          strict-origin-when-cross-origin always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # each property is a plain static directory; clean URLs with trailing slash
    location / { try_files $uri $uri/ =404; }

    # long-cache the shared menu + assets, but always revalidate html
    location = /nav.js { add_header Cache-Control "public, max-age=3600"; }
    location ~* \.html$ { add_header Cache-Control "no-cache"; }

    # the relay API (Knitweb p2p bridge, issue #337) — RelayTransport posts to
    # /api/relay/{send,fetch}. On an nginx host, run the FastAPI relay
    #   uvicorn scripts.relay_server:app --host 127.0.0.1 --port 8765
    # and enable this proxy (on Apache/PHP shared hosting the bundled
    # api/relay/relay.php + .htaccess serve the same endpoints instead):
    # location /api/relay/ {
    #     proxy_pass http://127.0.0.1:8765/api/relay/;
    #     proxy_read_timeout 60s;    # covers the 20 s long-poll on /fetch
    # }
}
